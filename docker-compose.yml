services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ambulance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ambulance}
      POSTGRES_DB: ${POSTGRES_DB:-ambulance_rcm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ambulance} -d ${POSTGRES_DB:-ambulance_rcm}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://ambulance:ambulance@db:5432/ambulance_rcm}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()\""]
      interval: 5s
      timeout: 5s
      retries: 20
    depends_on:
      db:
        condition: service_healthy

  claims-service:
    build:
      context: .
      dockerfile: services/claims-service/Dockerfile
    environment:
      DATABASE_URL: ${GO_DATABASE_URL:-postgres://ambulance:ambulance@db:5432/ambulance_rcm?sslmode=disable}
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "${CLAIMS_SERVICE_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_AI_SERVICE_URL: ${VITE_AI_SERVICE_URL:-http://localhost:8000}
      VITE_CLAIMS_SERVICE_URL: ${VITE_CLAIMS_SERVICE_URL:-http://localhost:8080}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - ai-service
      - claims-service

volumes:
  postgres-data:
